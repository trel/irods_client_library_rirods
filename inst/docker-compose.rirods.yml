# Minimal iRODS demo stack used by rirods.
name: irods-demo

services:
    irods-catalog:
        build:
            context: ./irods_demo/irods_catalog
        ports:
            - "5430:5432"
        environment:
            - POSTGRES_PASSWORD=testpassword
        restart: always

    irods-catalog-provider:
        build:
            context: ./irods_demo/irods_catalog_provider
        shm_size: 500mb
        healthcheck:
            test: ["CMD", "su", "-", "irods", "-c", 'echo -e "\x00\x00\x00\x33<MsgHeader_PI><type>HEARTBEAT</type></MsgHeader_PI>" | (exec 3<>/dev/tcp/127.0.0.1/1247; cat >&3; cat <&3; exec 3<&-)']
            interval: 10s
            timeout: 10s
            retries: 3
            start_period: 20s
            start_interval: 10s
        restart: always
        depends_on:
            - irods-catalog
            - minio

    irods-client-icommands:
        build:
            context: ./irods_demo/irods_client_icommands
        depends_on:
            irods-catalog-provider:
                condition: service_healthy

    irods-client-http-api:
        image: irods/irods_http_api:0.6.0
        volumes:
            - ./irods_demo/irods_client_http_api/config.json:/config.json:ro
        ports:
            - "9001:9000"
        restart: on-failure
        depends_on:
            irods-catalog-provider:
                condition: service_healthy

    minio:
        image: minio/minio:RELEASE.2024-09-13T20-26-02Z
        ports:
            - "19000:19000"
            - "19001:19001"
        volumes:
          - ./irods_demo/minio-data:/data
        command: minio server /data
        environment:
          MINIO_ROOT_USER: irods
          MINIO_ROOT_PASSWORD: irodsadmin
          MINIO_ADDRESS: ":19000"
          MINIO_CONSOLE_ADDRESS: ":19001"
